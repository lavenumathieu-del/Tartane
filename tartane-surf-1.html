<script>
/* ═══════════════════════════════════════════════════════════════════════════
   TARTANE SURF — APP STANDALONE
   Version : 2026-05 · Modèle calibré terrain
   ═══════════════════════════════════════════════════════════════════════════ */

// ── MODÈLE PHYSIQUE ────────────────────────────────────────────────────────
const SPOT = 1;
const r2d = d => d * Math.PI / 180;
const nd  = d => ((d % 360) + 360) % 360;
const da  = (a,b) => { let d=nd(a-b); return d>180?d-360:d; };
const expF = dir => Math.max(0, Math.cos(r2d(da(dir, SPOT))));

const caravelleF = (dir, T) => {
  dir = nd(dir);
  if (dir<=45 || dir>=225) return 1;
  const diff = 0.25 + 0.70 * Math.max(0, Math.min(1, (T-5)/12));
  if (dir<=85.5) { const d=(dir-45)/40.5; return Math.max(diff, 1 - d*d * (1-diff)); }
  if (dir<=145)  { const p=(dir-85.5)/59.5; return diff * (1 - 0.6 * p); }
  return 0;
};

const SHADOWS = [
  { name:"Dominique",  from:312.9, to:339.1, f: T => 0.10+0.90*Math.max(0,Math.min(1,(T-6)/16)) },
  { name:"Guadeloupe", from:333.5, to:349.8, f: T => 0.05+0.85*Math.max(0,Math.min(1,(T-8)/14)) },
];

const obstF = (dir, T) => {
  dir = nd(dir);
  let t = caravelleF(dir, T);
  if (!t) return 0;
  for (const z of SHADOWS) if (dir>=z.from && dir<=z.to) t *= z.f(T);
  return t;
};

const Heff = (H,dir,T) => H>0 && T>0 ? H*expF(dir)*obstF(dir,T) : 0;

// Combinaison avec cône directionnel ±45°
const CONE = 45;
function combineSpot(rawSwells, wDir, wSpd) {
  const sw = rawSwells.filter(s=>s.H>0 && s.T>0).map(s => ({
    ...s,
    heff: Heff(s.H, s.dir, s.T),
    expF: expF(s.dir),
    obstF: obstF(s.dir, s.T),
    coneStatus: "blocked",
  }));
  sw.sort((a,b) => b.heff - a.heff);
  const Hraw = Math.sqrt(rawSwells.reduce((s,x)=>s+(x.H||0)**2, 0));
  const dom  = sw[0];
  if (!dom || dom.heff === 0) {
    sw.forEach(s => s.coneStatus = "blocked");
    return { swells: sw, Hc: 0, Hraw, dominant: null, inCone: [], outCone: sw, cleanliness: 1, T: 0, wq: windQ(wDir,wSpd), wDir, wSpd };
  }
  const inCone = [], outCone = [];
  for (const s of sw) {
    if (s.heff === 0)                          { s.coneStatus = "blocked"; outCone.push(s); }
    else if (Math.abs(da(s.dir, dom.dir)) <= CONE) { s.coneStatus = "in";     inCone.push(s); }
    else                                       { s.coneStatus = "out";    outCone.push(s); }
  }
  const Hc = Math.sqrt(inCone.reduce((s,x)=>s+x.heff**2, 0));
  const inE = inCone.reduce((s,x)=>s+x.heff**2, 0);
  const outE = outCone.reduce((s,x)=>s+x.heff**2, 0);
  const cleanliness = inE > 0 ? Math.max(0.5, 1 - 0.3 * Math.sqrt(outE/inE)) : 1;
  return { swells: sw, Hc, Hraw, dominant: dom, inCone, outCone, cleanliness, T: dom.T, wq: windQ(wDir,wSpd), wDir, wSpd };
}

const groupF = T => Math.min(2.5, 1+0.11*Math.max(0,T-5));
const wStats = (Hs,T) => ({ Hs, h10:+(Hs*1.27).toFixed(2), hSet:+(Hs*groupF(T)).toFixed(2), GF:+groupF(T).toFixed(2) });

function windQ(wDir, wSpd) {
  const o = Math.cos(r2d(da(wDir,180)));
  if (o>.65 && wSpd<12) return { lbl:"Offshore ✓", col:"#39d353", v:1.0 };
  if (o>.30 && wSpd<18) return { lbl:"Side-off",  col:"#7ee787", v:0.7 };
  if (wSpd<8)           return { lbl:"Calme",      col:"#e8b84b", v:0.5 };
  if (o<-.4 || wSpd>25) return { lbl:"Onshore ✗", col:"#ff6b6b", v:0.0 };
  return                       { lbl:"Side-on",   col:"#ffa657", v:0.3 };
}

const sizeRate = (Hc,T) => {
  let s=0;
  if(Hc>.35)s++; if(Hc>.75)s++; if(Hc>1.2)s++; if(Hc>1.8)s++;
  if(T>11)s++;   if(T>14)s++;
  return Math.max(0, Math.min(5, s));
};
const rate = (Hc,T,wq,clean=1) => Math.max(0, Math.min(5, Math.round((sizeRate(Hc,T)+wq.v*1.5)*clean)));

const STARS = [
  {lbl:"Flat",     c:"#1e2130"},
  {lbl:"Faible",   c:"#768390"},
  {lbl:"Correct",  c:"#e8b84b"},
  {lbl:"Bon",      c:"#7ee787"},
  {lbl:"Très bon", c:"#39d353"},
  {lbl:"Épique",   c:"#00d4ff"},
];

const DIR_L = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSO","SO","OSO","O","ONO","NO","NNO"];
const dl = d => DIR_L[Math.round(nd(d)/22.5)%16];
const DAY_FR = ["DIM","LUN","MAR","MER","JEU","VEN","SAM"];

function blockReason(dir, T) {
  dir = nd(dir);
  if (expF(dir)<.05) return {r:"Hors expo",c:"#444"};
  const cf = caravelleF(dir, T);
  if (dir>45 && dir<225) return cf<.05
    ? {r:"Caravelle ×0",         c:"#ff6b6b"}
    : {r:`Caravelle ×${cf.toFixed(2)}`, c:"#ffa657"};
  const g = dir>=333.5 && dir<=349.8;
  const dm= dir>=312.9 && dir<=339.1;
  if (g && dm) return {r:`Dom+Guad ×${(SHADOWS[0].f(T)*SHADOWS[1].f(T)).toFixed(2)}`, c:"#ff6b6b"};
  if (g)       return {r:`Guadeloupe ×${SHADOWS[1].f(T).toFixed(2)}`, c:"#ffa657"};
  if (dm)      return {r:`Dominique ×${SHADOWS[0].f(T).toFixed(2)}`, c:"#e8b84b"};
  return       {r:`Expo ×${expF(dir).toFixed(2)}`, c:"#7ee787"};
}

// ── FETCH OPEN-METEO ──────────────────────────────────────────────────────
const COORDS = "latitude=14.7707&longitude=-60.8989&timezone=America%2FMartinique";

async function fetchForecast() {
  const marineURL = `https://marine-api.open-meteo.com/v1/marine?${COORDS}&hourly=swell_wave_height,swell_wave_direction,swell_wave_period,secondary_swell_wave_height,secondary_swell_wave_direction,secondary_swell_wave_period,wind_wave_height,wind_wave_direction,wind_wave_period&forecast_days=7`;
  const windURL   = `https://api.open-meteo.com/v1/forecast?${COORDS}&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=kn&forecast_days=7`;
  const [m, w] = await Promise.all([
    fetch(marineURL).then(r => { if (!r.ok) throw new Error("marine "+r.status); return r.json(); }),
    fetch(windURL  ).then(r => { if (!r.ok) throw new Error("wind "+r.status); return r.json(); }),
  ]);
  return processMarineWind(m, w);
}

async function fetchArchives(startDate, endDate) {
  const marineURL = `https://marine-api.open-meteo.com/v1/marine?${COORDS}&hourly=swell_wave_height,swell_wave_direction,swell_wave_period,secondary_swell_wave_height,secondary_swell_wave_direction,secondary_swell_wave_period,wind_wave_height,wind_wave_direction,wind_wave_period&start_date=${startDate}&end_date=${endDate}`;
  const windURL   = `https://archive-api.open-meteo.com/v1/archive?${COORDS}&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=kn&start_date=${startDate}&end_date=${endDate}`;
  const [m, w] = await Promise.all([
    fetch(marineURL).then(r => { if (!r.ok) throw new Error("marine "+r.status); return r.json(); }),
    fetch(windURL  ).then(r => { if (!r.ok) throw new Error("wind "+r.status); return r.json(); }),
  ]);
  return processMarineWind(m, w);
}

function processMarineWind(marine, wind) {
  const mh = marine.hourly;
  const wh = wind.hourly;
  // Index vent par timestamp
  const windByT = {};
  if (wh?.time) {
    wh.time.forEach((t, i) => {
      windByT[t] = { spd: wh.wind_speed_10m?.[i] ?? null, dir: wh.wind_direction_10m?.[i] ?? null };
    });
  }
  const hours = [];
  for (let i = 0; i < mh.time.length; i++) {
    const t    = mh.time[i];
    const hour = parseInt(t.slice(11,13));
    if (![6, 9, 12, 15, 18].includes(hour)) continue;
    const rawSwells = [
      {H: mh.swell_wave_height?.[i]||0,           dir: mh.swell_wave_direction?.[i]||0,           T: mh.swell_wave_period?.[i]||0,           lbl:"Houle primaire"},
      {H: mh.secondary_swell_wave_height?.[i]||0, dir: mh.secondary_swell_wave_direction?.[i]||0, T: mh.secondary_swell_wave_period?.[i]||0, lbl:"Houle secondaire"},
      {H: mh.wind_wave_height?.[i]||0,            dir: mh.wind_wave_direction?.[i]||0,            T: mh.wind_wave_period?.[i]||0,            lbl:"Mer de vent"},
    ];
    const w = windByT[t] || {};
    const wDir = w.dir ?? 90, wSpd = w.spd ?? 12;
    const res = combineSpot(rawSwells, wDir, wSpd);
    hours.push({
      t, hour, date: t.slice(0,10),
      sw: res.swells, inCone: res.inCone, outCone: res.outCone, dominant: res.dominant,
      Hc: res.Hc, Hraw: res.Hraw, cleanliness: res.cleanliness, T: res.T,
      wDir, wSpd, wq: res.wq,
      r: rate(res.Hc, res.T, res.wq, res.cleanliness),
      sizeR: sizeRate(res.Hc, res.T),
      stats: wStats(res.Hc, res.T),
      ratio: res.Hraw > 0 ? res.Hc / res.Hraw : 0,
    });
  }
  // Grouper par jour
  const days = [];
  let cur = null;
  for (const h of hours) {
    if (!cur || cur.date !== h.date) {
      if (cur) days.push(sumDay(cur));
      cur = { date: h.date, hours: [] };
    }
    cur.hours.push(h);
  }
  if (cur) days.push(sumDay(cur));
  return days;
}

function sumDay(d) {
  const hrs = d.hours;
  const maxR    = Math.max(...hrs.map(h=>h.r), 0);
  const maxSizeR= Math.max(...hrs.map(h=>h.sizeR), 0);
  const maxHc   = Math.max(...hrs.map(h=>h.Hc), 0);
  const maxHraw = Math.max(...hrs.map(h=>h.Hraw), 0);
  const best    = hrs.find(h=>h.r===maxR) || hrs[0];
  const date    = new Date(d.date+"T12:00:00");
  return {
    date: d.date, hrs, maxR, maxSizeR, maxHc, maxHraw,
    stats: wStats(maxHc, best?.T || 0),
    best, dayName: DAY_FR[date.getDay()], dayNum: date.getDate(),
  };
}

function setTab(name) {
  STATE.tab = name;
  document.querySelectorAll("nav button").forEach(b => b.classList.toggle("active", b.dataset.tab === name));
  document.querySelectorAll("section").forEach(s => s.classList.toggle("active", s.id === "tab-"+name));
  renderHeader();
  if (name === "forecast")     renderForecast();
  else if (name === "calc")     renderCalc();
  else if (name === "archives") renderArchives();
  else if (name === "journal")  renderJournal();
  else if (name === "model")    renderModel();
}

function renderHeader() {
  const el = document.getElementById("score-block");
  let score = null;
  if (STATE.tab === "calc") {
    const r = computeCalc();
    score = { Hc: r.Hc, Hraw: r.Hraw, rating: r.rating, ratio: r.ratio };
  } else if (STATE.forecast.days?.[STATE.forecast.selDay]) {
    const d = STATE.forecast.days[STATE.forecast.selDay];
    score = { Hc: d.maxHc, Hraw: d.maxHraw, rating: d.maxR, ratio: d.maxHraw > 0 ? d.maxHc/d.maxHraw : 0 };
  } else if (STATE.archives.days?.length && STATE.archives.selDate) {
    const dayHrs = STATE.archives.days.find(x => x.date === STATE.archives.selDate);
    if (dayHrs) score = { Hc: dayHrs.maxHc, Hraw: dayHrs.maxHraw, rating: dayHrs.maxR, ratio: dayHrs.maxHraw>0 ? dayHrs.maxHc/dayHrs.maxHraw : 0 };
  }
  if (!score) { el.innerHTML = ""; return; }
  const rc = STARS[score.rating].c;
  el.innerHTML = `
    <div class="score-num" style="color:${rc}">${score.Hc.toFixed(2)}<span class="unit">m</span></div>
    <div class="score-label" style="color:${rc}">${STARS[score.rating].lbl.toUpperCase()}</div>
    <div class="score-meta">brut ${score.Hraw.toFixed(2)}m · ${Math.round(score.ratio*100)}%</div>
  `;
}

function renderForecast() {
  const el = document.getElementById("forecast-content");
  const f  = STATE.forecast;
  if (f.loading) {
    el.innerHTML = `<div class="loading"><div class="µ">CHARGEMENT PRÉVISIONS OPEN-METEO</div>
      <div class="pulse-dots"><span></span><span></span><span></span></div>
      <div style="font-size:9px;color:#333;margin-top:10px">données ECMWF + GFS combinées</div></div>`;
    return;
  }
  if (f.err && !f.days) {
    el.innerHTML = `<div class="err-banner">Erreur : ${f.err}</div>
      <button class="btn" onclick="loadForecast()">RÉESSAYER</button>`;
    return;
  }
  if (!f.days) {
    el.innerHTML = `<button class="btn" onclick="loadForecast()">CHARGER PRÉVISIONS 7 JOURS</button>`;
    return;
  }
  const days = f.days;
  const curDay = days[f.selDay];
  const surfHrs = curDay?.hrs || [];
  const peakHc  = Math.max(...surfHrs.map(h=>h.Hc), 0.5);
  const fetchAge = Math.round((Date.now() - f.ts) / 60000);

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="µ">7 JOURS · OPEN-METEO · MAJ il y a ${fetchAge}min</div>
    <button class="refresh-btn" onclick="loadForecast()">↺ ACTUALISER</button>
  </div>`;
  html += `<div class="day-strip">`;
  days.forEach((d, i) => {
    const rc = STARS[d.maxR].c;
    const ratio = d.maxHraw > 0 ? d.maxHc/d.maxHraw : 0;
    html += `<div class="day-card ${i===f.selDay?'active':''}" onclick="selectForecastDay(${i})">
      <div class="day-name">${d.dayName}</div><div class="day-num">${d.dayNum}</div>
      <div class="day-hc" style="color:${rc}">${d.maxHc.toFixed(1)}</div>
      <div class="day-set" style="color:${rc}">▲${d.stats.hSet.toFixed(1)}</div>
      <div class="day-period">${d.best?.T || 0}s</div>
      <div class="stars">${[1,2,3,4,5].map(j => `<span style="background:${j<=d.maxR?rc:'rgba(255,255,255,0.07)'}"></span>`).join("")}</div>
      <div class="ratio" style="color:${ratio>.7?'#39d353':ratio>.4?'#e8b84b':'#ff6b6b'}">${Math.round(ratio*100)}%</div>
    </div>`;
  });
  html += `</div>`;

  if (curDay) {
    html += `<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px">
      <span class="µ">${curDay.dayName} ${curDay.dayNum}</span>
      ${curDay.best ? `<span style="font-size:9px;color:#444">meilleure ~${curDay.best.hour}h</span>` : ""}
    </div>
    <div class="hour-bars">`;
    surfHrs.forEach(h => {
      const rc = STARS[h.r].c;
      const rawPct  = Math.max(2, (h.Hraw / peakHc / 1.1) * 100);
      const corrPct = Math.max(2, (h.Hc   / peakHc / 1.1) * 100);
      const op = (f.selHour != null && f.selHour !== h.hour) ? 0.25 : 0.85;
      html += `<div class="hour-bar" onclick="selectForecastHour(${h.hour})">
        <div class="bar-raw" style="height:${rawPct}%">
          <div class="bar-corr" style="height:${Math.min(100, corrPct/rawPct*100)}%;background:${rc};opacity:${op}"></div>
        </div></div>`;
    });
    html += `</div><div class="hour-labels">`;
    surfHrs.forEach(h => {
      html += `<div class="${f.selHour===h.hour?'active':''}">${h.hour}h</div>`;
    });
    html += `</div><div class="µ" style="color:#333;margin-top:6px">░ brut · █ corrigé spot</div>`;

    if (f.selHour != null) {
      const selH = surfHrs.find(h => h.hour === f.selHour);
      if (selH) html += renderHourDetail(selH);
    }
    html += `</div>`;
  }
  el.innerHTML = html;
}

      </span>
    </div>`;
  for (const sw of h.sw) {

    const cs = sw.coneStatus || "blocked";

    const hcol = cs === "in" ? "#cdd9e5" : cs === "out" ? "#888" : "#333";

    html += `<div class="swell-row ${cs==='out'?'out-cone':''}">

        <div class="lbl"><span class="cone-icon" style="color:${icol}">${icon}</span>${sw.lbl}</div>

      </div>

      <div class="heff"><div class="h" style="color:${hcol}">${sw.heff.toFixed(2)}</div><div class="m">m</div></div>

  }
  if (h.outCone?.length > 0) {
    html += `<div style="font-size:9px;color:#e8b84b;padding:4px 9px;margin-bottom:5px">
      ≠ houle parasite hors cône ±45° — non additionnée. Cleanliness ×${h.cleanliness.toFixed(2)}

    <div><div class="µ">VENT</div><div style="font-size:10px;margin-top:1px">${dl(h.wDir)} ${h.wDir.toFixed(0)}° · ${h.wSpd.toFixed(0)} kts</div></div>
    <div style="font-size:12px;font-weight:700;color:${h.wq.col};align-self:center">${h.wq.lbl}</div>
  </div></div>`;
  return html;
}

function renderStatsBlock(stats, T) {
  const max = stats.hSet * 1.15;
  const rows = [
    {l:"Hs corrigé",            v:stats.Hs,   c:"#768390", h:"moyenne top 1/3"},
    {l:"H 10% (séries fréq.)",  v:stats.h10,  c:"#e8b84b", h:"×1.27 Rayleigh"},
    {l:"Séries ~10min",         v:stats.hSet, c:"#00d4ff", h:`×${stats.GF} groupement`},
  ];
  let html = `<div class="stats-block">
    <div class="µ" style="color:#00d4ff;margin-bottom:8px">STATS · T=${T}s · GF=×${stats.GF}</div>`;
  for (const r of rows) {
    html += `<div class="stats-row">
      <div class="lbl">${r.l}<br><span class="hint">${r.h}</span></div>
      <div class="bar"><div class="fill" style="width:${max>0?Math.min(100,r.v/max*100):0}%;background:${r.c}"></div></div>
      <div class="val" style="color:${r.c}">${r.v.toFixed(2)}<span style="font-size:8px;color:#333">m</span></div>
    </div>`;
  }
  return html + `</div>`;
}

function selectForecastDay(i) { STATE.forecast.selDay = i; STATE.forecast.selHour = null; renderHeader(); renderForecast(); }
function selectForecastHour(h) { STATE.forecast.selHour = STATE.forecast.selHour === h ? null : h; renderForecast(); }

async function loadForecast() {
  STATE.forecast.loading = true; STATE.forecast.err = null;
  renderForecast();
  try {
    const days = await fetchForecast();
    STATE.forecast.days = days;
    STATE.forecast.ts   = Date.now();
    LS.save("fc_cache", { days, ts: Date.now() });
  } catch (e) {
    STATE.forecast.err = e.message;
  } finally {
    STATE.forecast.loading = false;
    renderHeader();
    renderForecast();
  }
}

// ── CORRECTEUR ─────────────────────────────────────────────────────────────
function computeCalc() {
  const inp = STATE.calc.inp;
  const raw = [
    {H:+inp.s1.H||0,dir:+inp.s1.dir||0,T:+inp.s1.T||0,lbl:"Houle primaire"},
    {H:+inp.s2.H||0,dir:+inp.s2.dir||0,T:+inp.s2.T||0,lbl:"Houle secondaire"},
    {H:+inp.ww.H||0,dir:+inp.ww.dir||0,T:+inp.ww.T||0,lbl:"Mer de vent"},
  ];
  const wDir = +inp.wind.dir||90, wSpd = +inp.wind.spd||12;
  const res = combineSpot(raw, wDir, wSpd);
  return {
    sw: res.swells, inCone: res.inCone, outCone: res.outCone,
    Hc: res.Hc, Hraw: res.Hraw, cleanliness: res.cleanliness,
    T: res.T, wq: res.wq, wDir: res.wDir, wSpd: res.wSpd,
    rating: rate(res.Hc, res.T, res.wq, res.cleanliness),
    sizeR: sizeRate(res.Hc, res.T),
    stats: wStats(res.Hc, res.T),
    ratio: res.Hraw > 0 ? res.Hc/res.Hraw : 0,
  };
}

    <input type="text" placeholder="Hauteur réelle, séries observées…"
      value="${STATE.calc.obsNote}"
      style="width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.09);border-radius:5px;padding:8px 10px;color:#cdd9e5;font-size:11px;box-sizing:border-box;margin-bottom:8px"
      oninput="STATE.calc.obsNote=this.value">
    <button class="btn" onclick="saveSession()">ENREGISTRER</button>
  </div>`;

  el.innerHTML = html;
}

function setCalc(g, f, v) { STATE.calc.inp[g][f] = v; renderHeader(); renderCalc(); }
function stepCalc(g, f, delta, dec, mn, mx) {
  const cur = +STATE.calc.inp[g][f] || 0;
  const nxt = Math.max(mn, Math.min(mx, +(cur + delta).toFixed(dec)));
  STATE.calc.inp[g][f] = String(nxt);
  renderHeader(); renderCalc();
}
function setObsRating(r) { STATE.calc.obsRating = r; renderCalc(); }
function saveSession() {
  const r = computeCalc();
  const entry = {
    id: Date.now(),
    date: new Date().toLocaleDateString("fr-FR"),
    inp: JSON.parse(JSON.stringify(STATE.calc.inp)),
    Hc: r.Hc, modelR: r.rating, sizeR: r.sizeR,
    realR: STATE.calc.obsRating, notes: STATE.calc.obsNote,
  };
  STATE.journal = [entry, ...STATE.journal].slice(0, 60);
  LS.save("journal", STATE.journal);
  STATE.calc.obsNote = "";
  renderCalc();
}

// ── ARCHIVES ───────────────────────────────────────────────────────────────
async function loadArchives() {
  STATE.archives.loading = true; STATE.archives.err = null;
  renderArchives();
  try {
    const days = await fetchArchives("2026-03-01", "2026-04-30");
    STATE.archives.days = days;
    LS.save("arch_cache", { days });
  } catch (e) {
    STATE.archives.err = e.message;
  } finally {
    STATE.archives.loading = false;
    renderArchives();
  }
}

function selectArchiveDate(d) { STATE.archives.selDate = STATE.archives.selDate === d ? null : d; renderHeader(); renderArchives(); }

function saveArchObs(date, hour, r, notes) {
  const key = `${date}|${hour}`;
  if (r === "" && !notes) delete STATE.archives.obs[key];
  else STATE.archives.obs[key] = { r, notes };
  LS.save("arch_obs", STATE.archives.obs);
  renderArchives();
}

function renderArchives() {
  const el = document.getElementById("archives-content");
  const a  = STATE.archives;

  if (a.loading) {
    el.innerHTML = `<div class="loading"><div class="µ">CHARGEMENT ARCHIVES MARS-AVRIL</div>
      <div class="pulse-dots"><span></span><span></span><span></span></div></div>`;
    return;
  }
  if (!a.days) {
    el.innerHTML = `
      <div class="card" style="border-color:rgba(0,212,255,0.15)">
        <div class="µ" style="color:#00d4ff;margin-bottom:10px">ARCHIVES MARS-AVRIL 2026</div>
        <div style="font-size:10px;color:#768390;line-height:1.7;margin-bottom:12px">
          Source : Open-Meteo Marine (ERA5 + Copernicus Marine).<br>
          61 jours × 5 fenêtres horaires = 305 points de données avec correction Tartane.<br>
          Tu pourras saisir tes observations réelles pour calibrer le modèle.
        </div>
        ${a.err ? `<div class="err-banner">Erreur : ${a.err}</div>` : ""}
        <button class="btn" onclick="loadArchives()">⬇ CHARGER LES ARCHIVES</button>
      </div>`;
    return;
  }

  const obsCount = Object.keys(a.obs).length;
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px">
    <div class="µ">${a.days.length} JOURS · ${obsCount} OBS SAISIES</div>
    <button class="refresh-btn" onclick="loadArchives()">↺ RECHARGER</button>
  </div>`;

  for (const month of ["2026-03", "2026-04"]) {
    const label = month === "2026-03" ? "MARS 2026" : "AVRIL 2026";
    const daysInMonth = month === "2026-03" ? 31 : 30;
    const firstDow = new Date(month+"-01T12:00:00").getDay();
    html += `<div class="card"><div class="µ" style="margin-bottom:10px">${label}</div>
      <div class="cal-head">${["D","L","M","M","J","V","S"].map(x => `<div>${x}</div>`).join("")}</div>
      <div class="cal-grid">`;
    for (let i = 0; i < firstDow; i++) html += `<div></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${month}-${String(d).padStart(2,"0")}`;
      const dayRow  = a.days.find(x => x.date === dateStr);
      const obs     = dayRow ? dayRow.hrs.filter(h => a.obs[`${dateStr}|${h.hour}`]).length : 0;
      const isSel   = a.selDate === dateStr;
      if (!dayRow) {
        html += `<div class="cal-cell"><div class="d" style="color:#333">${d}</div></div>`;
      } else {
        const maxR = dayRow.maxSizeR;
        const rc   = STARS[maxR].c;
        html += `<div class="cal-cell has-data ${isSel?'active':''}" style="background:${rc}18;border-color:${rc}44" onclick="selectArchiveDate('${dateStr}')">
          <div class="d" style="color:${rc}">${d}</div>
          ${dayRow.maxHc>0 ? `<div class="hc" style="color:${rc}">${dayRow.maxHc.toFixed(1)}</div>` : ""}
          ${obs>0 ? `<div class="obs-dot"></div>` : ""}
        </div>`;
      }
    }
    html += `</div></div>`;
  }

  // Détail jour sélectionné
  if (a.selDate) {
    const dayRow = a.days.find(d => d.date === a.selDate);
    if (dayRow) {
      const dateObj = new Date(a.selDate+"T12:00:00");
      html += `<div class="card fi" style="border-color:rgba(0,212,255,0.2);margin-top:14px">
        <div class="µ" style="color:#00d4ff;margin-bottom:12px">
          ${dateObj.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}).toUpperCase()} — DONNÉES OPEN-METEO CORRIGÉES
        </div>`;
      for (const h of dayRow.hrs) {
        const key   = `${a.selDate}|${h.hour}`;
        const saved = a.obs[key] || { r: "", notes: "" };
        const compR = h.sizeR;
        const compColor = STARS[compR].c;
        const rc    = STARS[h.r].c;
        const delta = saved.r !== "" ? saved.r - compR : null;
        html += `<div class="day-row">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:12px;font-weight:700;color:#768390">${String(h.hour).padStart(2,"0")}h</span>
              <span style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:${rc}">${h.Hc.toFixed(2)}m</span>
              <span style="font-size:9px;color:#444">▲${h.stats.hSet.toFixed(2)}m · ${h.T}s · ${Math.round(h.ratio*100)}%</span>
            </div>
            <div style="text-align:right">
              <span style="font-size:10px;font-weight:700;color:${compColor}">${STARS[compR].lbl}</span>
              <div style="font-size:8px;color:#444">note taille</div>
            </div>
          </div>`;
        for (const sw of h.sw) {
          const bl = blockReason(sw.dir, sw.T);
          const cs = sw.coneStatus || "blocked";
          const icon = cs === "in" ? "✓" : cs === "out" ? "≠" : "×";
          const icol = cs === "in" ? "#39d353" : cs === "out" ? "#e8b84b" : "#444";
          const hcol = cs === "in" ? "#cdd9e5" : cs === "out" ? "#888" : "#333";
          html += `<div style="display:flex;align-items:center;gap:6px;font-size:10px;margin-bottom:3px;${cs==='out'?'opacity:0.65':''}">
            <span style="color:${icol};min-width:10px;font-weight:700">${icon}</span>
            <div style="width:5px;height:5px;border-radius:50%;background:${bl.c};flex-shrink:0"></div>
            <span style="color:#555;min-width:90px">${sw.lbl}</span>
            <span style="color:#768390">${dl(sw.dir)} ${sw.dir}° · ${sw.H.toFixed(2)}m · ${sw.T.toFixed(0)}s</span>
            <span style="margin-left:auto;font-size:9px;color:${bl.c}">${bl.r}</span>
            <span style="font-weight:700;color:${hcol};min-width:38px;text-align:right">${sw.heff.toFixed(2)}m</span>
          </div>`;
        }
        html += `<div style="font-size:9px;color:#444;margin:8px 0">
          Vent ${dl(h.wDir)} ${h.wDir.toFixed(0)}° ${h.wSpd.toFixed(0)}kt — <span style="color:${h.wq.col}">${h.wq.lbl}</span>
        </div>`;
        html += `<div style="padding:8px 10px;background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.1);border-radius:5px">
          <div class="µ" style="color:#00d4ff;margin-bottom:6px">TON OBSERVATION CE JOUR-LÀ</div>
          <div class="rating-row" style="margin-bottom:6px">
            ${[0,1,2,3,4,5].map(rv => {
              const sel = saved.r === rv;
              const ge  = saved.r !== "" && rv <= +saved.r && rv > 0;
              const bg  = sel ? STARS[rv].c : ge ? STARS[+saved.r].c+"33" : "rgba(255,255,255,0.04)";
              const col = sel || ge ? "#000" : "#555";
              const t   = rv === 0 ? "FLAT" : rv;
              return `<button class="${rv===0?'flat-btn':''}" style="background:${bg};color:${col}" onclick="saveArchObs('${a.selDate}',${h.hour},${rv},'${(saved.notes||"").replace(/'/g,"\\'")}')">${t}</button>`;
            }).join("")}
          </div>
          ${saved.r !== "" && delta !== null ? `<div style="font-size:9px;color:${Math.abs(delta)<=1?'#39d353':'#ffa657'};text-align:center;margin-bottom:6px">
            ${delta===0 ? "modèle ✓" : delta>0 ? `modèle sous-estime de ${delta}` : `modèle surestime de ${Math.abs(delta)}`}
          </div>` : ""}
          <input type="text" placeholder="Notes : hauteur vue, séries..."
            value="${(saved.notes||"").replace(/"/g, "&quot;")}"
            style="width:100%;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:6px 8px;color:#cdd9e5;font-size:10px;box-sizing:border-box"
            onchange="saveArchObs('${a.selDate}',${h.hour},'${saved.r}',this.value)">
        </div></div>`;
      }
      html += `</div>`;
    }
  }

  // Biais
  const validObs = Object.entries(a.obs).filter(([,v]) => v.r !== "");
  if (validObs.length >= 5) {
    const pairs = validObs.map(([k, v]) => {
      const [date, hour] = k.split("|");
      const dayRow = a.days.find(d => d.date === date);
      const h = dayRow?.hrs.find(x => x.hour === +hour);
      return h ? { model: h.sizeR, real: +v.r } : null;
    }).filter(Boolean);
    if (pairs.length) {
      const avg = pairs.reduce((s, p) => s + (p.real - p.model), 0) / pairs.length;
      const absAvg = Math.abs(avg);
      html += `<div class="card" style="border-color:rgba(0,212,255,0.2);background:rgba(0,212,255,0.03);margin-top:12px">
        <div class="µ" style="color:#00d4ff;margin-bottom:8px">BIAIS TAILLE SUR ${pairs.length} OBSERVATIONS</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:${absAvg<.5?'#39d353':'#ffa657'};margin-bottom:6px">
          ${avg>0?"+":""}${avg.toFixed(2)} crans
        </div>
        <div style="font-size:10px;color:#768390;line-height:1.6">
          ${absAvg<.4 ? "Calibration taille correcte ✓"
            : avg>0  ? "Le modèle sous-estime la taille — augmenter les coefficients de transmission"
            :          "Le modèle surestime — réduire les coefficients"}
          <br><span style="font-size:9px;color:#444">Comparaison sur la note TAILLE seule (sans vent/cleanliness)</span>
        </div>
      </div>`;
    }
  }

  el.innerHTML = html;
}

// ── JOURNAL ─────────────────────────────────────────────────────────────────
function renderJournal() {
  const el = document.getElementById("journal-content");
  const j  = STATE.journal;
  if (j.length === 0) {
    el.innerHTML = `<div class="µ">0 SESSION</div>
      <div style="text-align:center;padding:48px 0;color:#333;font-size:11px">
        Aucune session enregistrée.<br><span style="font-size:9px">Enregistre depuis CORRECTEUR.</span>
      </div>`;
    return;
  }
  let html = `<div class="µ">${j.length} SESSION${j.length>1?'S':''}</div>`;
  for (const o of j) {
    const delta = o.realR - (o.sizeR ?? o.modelR);
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px">
        <div><div class="µ">${o.date}</div>
          <div style="margin-top:4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span style="font-size:13px;font-weight:700;color:${STARS[o.realR].c}">${STARS[o.realR].lbl}</span>
            <span style="font-size:9px;color:#444">${o.Hc?.toFixed(2)}m · ${o.inp?.s1?.dir}° ${o.inp?.s1?.T}s</span>
          </div>
        </div>
        <div style="text-align:right"><div class="µ">modèle taille</div>
          <div style="font-size:12px;color:${STARS[o.sizeR ?? o.modelR].c};font-weight:700">${STARS[o.sizeR ?? o.modelR].lbl}
            <span style="margin-left:5px;font-size:10px;color:${delta===0?'#39d353':'#ffa657'}">${delta>0?'+'+delta:delta<0?delta:'✓'}</span>
          </div>
        </div>
      </div>
      ${o.notes ? `<div style="font-size:10px;color:#768390;margin-top:6px">${o.notes}</div>` : ""}
    </div>`;
  }
  if (j.length >= 3) {
    const avg = j.map(o => o.realR - (o.sizeR ?? o.modelR)).reduce((s,d) => s+d, 0) / j.length;
    html += `<div class="card" style="border-color:rgba(0,212,255,0.15);margin-top:14px">
      <div class="µ" style="color:#00d4ff;margin-bottom:6px">BIAIS MOYEN</div>
      <div style="font-size:10px;color:#cdd9e5">
        ${avg>.4 ? `+${avg.toFixed(1)} — sous-estime`
        : avg<-.4 ? `${avg.toFixed(1)} — surestime`
        :           `${avg.toFixed(1)} — calibration correcte ✓`}
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

// ── MODÈLE ──────────────────────────────────────────────────────────────────
function renderModel() {
  const el = document.getElementById("model-content");
  const zones = [
    {n:"CARAVELLE — pointe à 85.5°", arc:"45°→85.5° flanc · 85.5°→145° derrière", dist:"7.5 km", c:"#ff6b6b",
     d:"Modèle calibré sur observations terrain. Diffraction 25-95% selon période. T=10s à 85° → ~55%. T=16s à 90° → ~85%."},
    {n:"GUADELOUPE · Pointe des Châteaux", arc:"333.5° → 349.8°", dist:"133-167 km", c:"#ffa657",
     d:"Ombre forte. 5% à T=8s → 90% à T=22s. Les très longs groundswells contournent Basse-Terre."},
    {n:"DOMINIQUE", arc:"312.9° → 339.1°", dist:"72-102 km", c:"#e8b84b",
     d:"Ombre modérée. 10% à T=6s → 100% à T=22s."},
  ];
  let html = "";
  for (const z of zones) {
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:4px">
        <div style="font-size:10px;font-weight:700;color:${z.c}">${z.n}</div>
        <div style="font-size:8px;color:#333">${z.dist}</div>
      </div>
      <div class="µ" style="color:#555;margin-bottom:4px">${z.arc}</div>
      <div style="font-size:10px;color:#768390;line-height:1.7">${z.d}</div>
    </div>`;
  }

  html += `<div class="card" style="border-color:rgba(57,211,83,0.2);background:rgba(57,211,83,0.03)">
    <div class="µ" style="color:#39d353;margin-bottom:8px">CÔNE DE COHÉRENCE DIRECTIONNELLE</div>
    <div style="font-size:10px;color:#cdd9e5;line-height:1.7;margin-bottom:8px">
      <span style="color:#39d353">✓</span> Composantes dans le cône <strong>±45°</strong> autour de la dominante → s'additionnent en énergie (vague combinée cohérente).<br>
      <span style="color:#e8b84b">≠</span> Composantes hors cône → affichées mais <strong>NON additionnées</strong> à Hc.<br><br>
      Pénalité de cleanliness appliquée à la note quand énergie parasite significative.
    </div>
    <div style="font-size:9px;color:#555;font-family:monospace;line-height:1.6">
      Hc = √(Σ H²_eff,i)  pour i ∈ cône ±45°<br>
      cleanliness = max(0.5, 1 − 0.3 × √(E_hors / E_dans))<br>
      note = round((sizeRate + vent×1.5) × cleanliness)
    </div>
  </div>`;

  // Rose
  html += `<div class="card"><div class="µ">ROSE D'EXPOSITION 360°</div><div class="rose">`;
  for (let i = 0; i < 72; i++) {
    const d = i * 5;
    const clean = d >= 350 || d <= 45;
    const guad  = d >= 333.5 && d <= 349.8;
    const dom   = d >= 312.9 && d <= 339.1;
    const cL = d > 45 && d <= 85;
    const cD = d > 85 && d < 130;
    const cX = d >= 130 && d < 225;
    let bg;
    if (cX) bg = "#090b10";
    else if (cD) bg = `rgba(255,80,80,${(0.12+(130-d)/45*0.18).toFixed(2)})`;
    else if (cL) bg = `rgba(255,130,80,${(0.12+(d-45)/40*0.32).toFixed(2)})`;
    else if (guad) bg = "rgba(255,100,100,0.55)";
    else if (dom)  bg = "rgba(255,166,87,0.45)";
    else if (clean) bg = "rgba(0,212,255,0.65)";
    else bg = "rgba(255,255,255,0.04)";
    html += `<div style="flex:1;background:${bg}"></div>`;
  }
  html += `</div><div class="rose-labels">${["NO","N","NE","E","SE","S","SO","O","NO"].map(l => `<div>${l}</div>`).join("")}</div></div>`;

  // Stats
  html += `<div class="card" style="border-color:rgba(0,212,255,0.15);background:rgba(0,212,255,0.03)">
    <div class="µ" style="color:#00d4ff;margin-bottom:8px">STATISTIQUES SPECTRALES</div>
    <div style="font-size:10px;line-height:1.7;color:#cdd9e5">
      <strong>H 10%</strong> = Hs × 1.27 — top 10% selon Rayleigh<br>
      <strong>H séries</strong> = Hs × GF(T) — séries après ~10min d'attente<br>
      <span style="color:#555">GF(7s)=1.22 · GF(12s)=1.77 · GF(15s)=2.10 · GF(18s)=2.43 — calibré sur observation 0.60m réelle à T=15s/Hs=0.29m</span>
    </div>
  </div>`;

  html += `<div class="card" style="margin-top:14px;background:rgba(0,0,0,0.3)">
    <div class="µ" style="margin-bottom:8px;color:#444">SOURCES DONNÉES</div>
    <div style="font-size:9px;color:#555;line-height:1.7">
      Prévisions : Open-Meteo Marine API (combine GFS Waves + IFS HRES + WaveWatch III)<br>
      Archives : ERA5 + Copernicus Marine via Open-Meteo<br>
      Vent : Open-Meteo Forecast / Archive<br><br>
      Coordonnées Tartane : 14.7707°N / 60.8989°W
    </div>
  </div>`;

  el.innerHTML = html;
}

// ── INIT ────────────────────────────────────────────────────────────────────
document.querySelectorAll("nav button").forEach(b => {
  b.addEventListener("click", () => setTab(b.dataset.tab));
});

loadState();
renderHeader();
renderForecast();
renderCalc();
renderModel();
renderJournal();
renderArchives();

// Auto-fetch au démarrage si pas de cache
if (!STATE.forecast.days) {
  loadForecast();
}

</script>
