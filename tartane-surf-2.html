<script>
/* ═══════════════════════════════════════════════════════════════════════════
   TARTANE SURF — APP STANDALONE
   Version : 2026-05 · Modèle calibré terrain
   ═══════════════════════════════════════════════════════════════════════════ */

// ── MODÈLE PHYSIQUE ────────────────────────────────────────────────────────
const SPOT = 1;
const r2d = d => d * Math.PI / 180;
const nd  = d => ((d % 360) + 360) % 360;
const da  = (a,b) => { let d=nd(a-b); return d>180?d-360:d; };
const expF = dir => Math.max(0, Math.cos(r2d(da(dir, SPOT))));

const caravelleF = (dir, T) => {
  dir = nd(dir);
  if (dir<=45 || dir>=225) return 1;
  const diff = 0.25 + 0.70 * Math.max(0, Math.min(1, (T-5)/12));
  if (dir<=85.5) { const d=(dir-45)/40.5; return Math.max(diff, 1 - d*d * (1-diff)); }
  if (dir<=145)  { const p=(dir-85.5)/59.5; return diff * (1 - 0.6 * p); }
  return 0;
};

const SHADOWS = [
  { name:"Dominique",  from:312.9, to:339.1, f: T => 0.10+0.90*Math.max(0,Math.min(1,(T-6)/16)) },
  { name:"Guadeloupe", from:333.5, to:349.8, f: T => 0.05+0.85*Math.max(0,Math.min(1,(T-8)/14)) },
];

const obstF = (dir, T) => {
  dir = nd(dir);
  let t = caravelleF(dir, T);
  if (!t) return 0;
  for (const z of SHADOWS) if (dir>=z.from && dir<=z.to) t *= z.f(T);
  return t;
};

const Heff = (H,dir,T) => H>0 && T>0 ? H*expF(dir)*obstF(dir,T) : 0;

// ── AUTO-CALIBRATION : facteur d'amplification global appris des observations ─
// Comparaison sizeR_modèle vs note_réelle (en crans) → ajustement de Hc.
// Un cran de biais ≈ 30-50% de Hc selon les seuils. Pour éviter la sur-correction,
// on amplifie de 8% par cran avec plafond ±35% (équivalent ±5 crans).
function computeCalibrationFactor(obs, archDays) {
  if (!archDays || !archDays.length) return 1.0;
  const pairs = [];
  for (const [key, val] of Object.entries(obs || {})) {
    if (val.r === "" || val.r == null) continue;
    const [date, hourStr] = key.split("|");
    const day = archDays.find(d => d.date === date);
    if (!day) continue;
    const hh = day.hrs.find(x => x.hour === +hourStr);
    if (!hh) continue;
    pairs.push({ model: hh.sizeR, real: +val.r });
  }
  if (pairs.length < 3) return 1.0;       // pas assez de données → pas de correction
  const bias = pairs.reduce((s,p) => s + (p.real - p.model), 0) / pairs.length;
  const clamped = Math.max(-5, Math.min(5, bias));
  return 1 + 0.08 * clamped;
}

// ── BIAIS STRATIFIÉ PAR SECTEUR DIRECTIONNEL ──────────────────────────────
// Identifie le biais moyen séparément pour chaque secteur d'arrivée de houle.
// Permet de détecter si le modèle sous-estime spécifiquement une zone géographique
// (ex: houles E rentrant plus que prévu via Caravelle) sans contaminer les autres.
const SECTORS = [
  { key:"N",  lbl:"Nord atlantique",      range:[350, 30],  col:"#00d4ff",
    hint:"Fenêtre directe, pas d'obstacle" },
  { key:"NE", lbl:"Nord-Est",              range:[30, 60],   col:"#39d353",
    hint:"Atlantique légèrement décalé" },
  { key:"E",  lbl:"Est / ENE",             range:[60, 100],  col:"#ffa657",
    hint:"Zone Caravelle (flanc + pointe)" },
  { key:"NO", lbl:"Nord-Ouest",            range:[300, 350], col:"#ff6b6b",
    hint:"Ombre Dominique + Guadeloupe" },
];

function inSectorRange(dir, range) {
  const d = nd(dir);
  const [lo, hi] = range;
  return lo > hi ? (d >= lo || d <= hi) : (d >= lo && d <= hi);
}

function computeStratifiedBias(obs, archDays) {
  if (!archDays || !archDays.length) return SECTORS.map(s => ({ ...s, count:0, bias:null, std:null, samples:[] }));

  const buckets = SECTORS.map(s => ({ ...s, samples: [] }));

  for (const [key, val] of Object.entries(obs || {})) {
    if (val.r === "" || val.r == null) continue;
    const [date, hourStr] = key.split("|");
    const day = archDays.find(d => d.date === date);
    if (!day) continue;
    const hh = day.hrs.find(x => x.hour === +hourStr);
    if (!hh || !hh.dominant) continue;

    const dir = hh.dominant.dir;
    for (const b of buckets) {
      if (inSectorRange(dir, b.range)) {
        b.samples.push({
          model: hh.sizeR,
          real: +val.r,
          dir,
          T: hh.dominant.T,
          date,
          hour: +hourStr,
        });
        break;
      }
    }
  }

  return buckets.map(b => {
    if (!b.samples.length) return { ...b, count: 0, bias: null, std: null };
    const bias = b.samples.reduce((s,p)=>s+(p.real-p.model), 0) / b.samples.length;
    const variance = b.samples.reduce((s,p)=>s+Math.pow((p.real-p.model)-bias, 2), 0) / b.samples.length;
    return { ...b, count: b.samples.length, bias, std: Math.sqrt(variance) };
  });
}

// Combinaison avec cône directionnel ±45°
const CONE = 45;
function combineSpot(rawSwells, wDir, wSpd) {
  const sw = rawSwells.filter(s=>s.H>0 && s.T>0).map(s => ({
    ...s,
    heff: Heff(s.H, s.dir, s.T),
    expF: expF(s.dir),
    obstF: obstF(s.dir, s.T),
    coneStatus: "blocked",
  }));
  sw.sort((a,b) => b.heff - a.heff);
  const Hraw = Math.sqrt(rawSwells.reduce((s,x)=>s+(x.H||0)**2, 0));
  const dom  = sw[0];
  if (!dom || dom.heff === 0) {
    sw.forEach(s => s.coneStatus = "blocked");
    return { swells: sw, Hc: 0, Hraw, dominant: null, inCone: [], outCone: sw, cleanliness: 1, T: 0, wq: windQ(wDir,wSpd), wDir, wSpd };
  }
  const inCone = [], outCone = [];
  for (const s of sw) {
    if (s.heff === 0)                          { s.coneStatus = "blocked"; outCone.push(s); }
    else if (Math.abs(da(s.dir, dom.dir)) <= CONE) { s.coneStatus = "in";     inCone.push(s); }
    else                                       { s.coneStatus = "out";    outCone.push(s); }
  }
  const Hc_raw = Math.sqrt(inCone.reduce((s,x)=>s+x.heff**2, 0));
  // Applique le facteur de calibration appris (auto-correction du modèle)
  const Hc = Hc_raw * (typeof STATE !== "undefined" && STATE.calibration ? STATE.calibration : 1);
  const inE = inCone.reduce((s,x)=>s+x.heff**2, 0);
  const outE = outCone.reduce((s,x)=>s+x.heff**2, 0);
  const cleanliness = inE > 0 ? Math.max(0.5, 1 - 0.3 * Math.sqrt(outE/inE)) : 1;
  return { swells: sw, Hc, Hraw, dominant: dom, inCone, outCone, cleanliness, T: dom.T, wq: windQ(wDir,wSpd), wDir, wSpd };
}

const groupF = T => Math.min(2.5, 1+0.11*Math.max(0,T-5));
const wStats = (Hs,T) => ({ Hs, h10:+(Hs*1.27).toFixed(2), hSet:+(Hs*groupF(T)).toFixed(2), GF:+groupF(T).toFixed(2) });

function windQ(wDir, wSpd) {
  const o = Math.cos(r2d(da(wDir,180)));
  if (o>.65 && wSpd<12) return { lbl:"Offshore ✓", col:"#39d353", v:1.0 };
  if (o>.30 && wSpd<18) return { lbl:"Side-off",  col:"#7ee787", v:0.7 };
  if (wSpd<8)           return { lbl:"Calme",      col:"#e8b84b", v:0.5 };
  if (o<-.4 || wSpd>25) return { lbl:"Onshore ✗", col:"#ff6b6b", v:0.0 };
  return                       { lbl:"Side-on",   col:"#ffa657", v:0.3 };
}

const sizeRate = (Hc,T) => {
  let s=0;
  if(Hc>.35)s++; if(Hc>.75)s++; if(Hc>1.2)s++; if(Hc>1.8)s++;
  if(T>11)s++;   if(T>14)s++;
  return Math.max(0, Math.min(5, s));
};
const rate = (Hc,T,wq,clean=1) => Math.max(0, Math.min(5, Math.round((sizeRate(Hc,T)+wq.v*1.5)*clean)));
// Note complète : ajoute le facteur marée à la note vent
const rateTide = (Hc,T,wq,clean=1,tideQ=1) => Math.max(0, Math.min(5, Math.round((sizeRate(Hc,T)+wq.v*1.5)*clean*tideQ)));

function blockReason(dir, T) {
  dir = nd(dir);
  if (expF(dir)<.05) return {r:"Hors expo",c:"#444"};
  const cf = caravelleF(dir, T);
  if (dir>45 && dir<225) return cf<.05
    ? {r:"Caravelle ×0",         c:"#ff6b6b"}
    : {r:`Caravelle ×${cf.toFixed(2)}`, c:"#ffa657"};
  const g = dir>=333.5 && dir<=349.8;
  const dm= dir>=312.9 && dir<=339.1;
  if (g && dm) return {r:`Dom+Guad ×${(SHADOWS[0].f(T)*SHADOWS[1].f(T)).toFixed(2)}`, c:"#ff6b6b"};
  if (g)       return {r:`Guadeloupe ×${SHADOWS[1].f(T).toFixed(2)}`, c:"#ffa657"};
  if (dm)      return {r:`Dominique ×${SHADOWS[0].f(T).toFixed(2)}`, c:"#e8b84b"};
  return       {r:`Expo ×${expF(dir).toFixed(2)}`, c:"#7ee787"};
}

// ── MODÈLE DE MARÉE (reef break Tartane) ──────────────────────────────────
// Physique : sur un reef, la profondeur d'eau au-dessus du récif détermine
// le mode de déferlement via le critère H_break = γ × h (γ ≈ 0.78).
// Marnage microtidal aux Antilles (~30-60cm) mais effet massif sur la qualité.
// Observations terrain (utilisateur) :
//   - Basse étale : peu de séries, attente longue
//   - Basse + courant : creux, rapide, close out occasionnel (~40% session 1-2 avril)
//   - Mi-marée descendante : optimum
//   - Haute + courant : pente molle, déferlement encore correct
//   - Haute étale : mou, peu qualitatif
function tideQuality(hNorm, dhNorm) {
  // hNorm : niveau dans le cycle, -1 (basse) à +1 (haute)
  // dhNorm : dérivée, -1 (descend vite) à +1 (monte vite)

  // Facteur niveau : cloche centrée sur mi-marée
  const levelF = 1 - 0.4 * hNorm * hNorm;
  // = 1.0 à mi-marée, 0.6 aux extrêmes

  // Asymétrie : légère préférence descendante (typique reef tropical)
  const asym = dhNorm < 0 ? 1.0 : 0.92;

  // Facteur courant : pénalité à l'étale
  const flowF = 0.4 + 0.6 * Math.min(1, 2 * Math.abs(dhNorm));
  // = 0.4 à étale parfaite, 1.0 à pleine vitesse

  return Math.max(0.3, Math.min(1.0, levelF * asym * flowF));
}

// Label de phase de marée à partir de (hNorm, dhNorm)
function tidePhase(hNorm, dhNorm) {
  const isEtale = Math.abs(dhNorm) < 0.2;
  if (isEtale) return hNorm > 0 ? "Étale haute"   : "Étale basse";
  const dir   = dhNorm > 0 ? "↑ Mont." : "↓ Desc.";
  if (Math.abs(hNorm) < 0.35) return `Mi-marée ${dir}`;
  return hNorm > 0 ? `Haute ${dir}` : `Basse ${dir}`;
}

const COORDS = "latitude=14.7707&longitude=-60.8989&timezone=America%2FMartinique";
const MARINE_VARS = "swell_wave_height,swell_wave_direction,swell_wave_period,secondary_swell_wave_height,secondary_swell_wave_direction,secondary_swell_wave_period,wind_wave_height,wind_wave_direction,wind_wave_period,sea_level_height_msl";

async function fetchForecast() {
  const marineURL = `https://marine-api.open-meteo.com/v1/marine?${COORDS}&hourly=${MARINE_VARS}&forecast_days=7`;
  const windURL   = `https://api.open-meteo.com/v1/forecast?${COORDS}&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=kn&forecast_days=7`;
  const [m, w] = await Promise.all([
    fetch(marineURL).then(r => { if (!r.ok) throw new Error("marine "+r.status); return r.json(); }),
    fetch(windURL  ).then(r => { if (!r.ok) throw new Error("wind "+r.status); return r.json(); }),
  ]);
  return processMarineWind(m, w);
}

async function fetchArchives(startDate, endDate) {
  const marineURL = `https://marine-api.open-meteo.com/v1/marine?${COORDS}&hourly=${MARINE_VARS}&start_date=${startDate}&end_date=${endDate}`;
  const windURL   = `https://archive-api.open-meteo.com/v1/archive?${COORDS}&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=kn&start_date=${startDate}&end_date=${endDate}`;
  const [m, w] = await Promise.all([
    fetch(marineURL).then(r => { if (!r.ok) throw new Error("marine "+r.status); return r.json(); }),
    fetch(windURL  ).then(r => { if (!r.ok) throw new Error("wind "+r.status); return r.json(); }),
  ]);
  return processMarineWind(m, w);
}

function processMarineWind(marine, wind) {
  const mh = marine.hourly;
  const wh = wind.hourly;
  // Index vent par timestamp
  const windByT = {};
  if (wh?.time) {
    wh.time.forEach((t, i) => {
      windByT[t] = { spd: wh.wind_speed_10m?.[i] ?? null, dir: wh.wind_direction_10m?.[i] ?? null };
    });
  }

  // ── Pré-calcul des paramètres de marée sur toute la période ────────────
  // sea_level_height_msl est en mètres relatifs au niveau moyen
  const tideRaw = mh.sea_level_height_msl || [];
  // Calculer min/max localement sur fenêtre glissante de 24h pour normaliser
  // (les amplitudes varient selon le cycle vives-eaux / mortes-eaux)
  const tideStats = [];
  const W = 12; // demi-fenêtre 12h → fenêtre 24h
  for (let i = 0; i < tideRaw.length; i++) {
    const lo = Math.max(0, i - W);
    const hi = Math.min(tideRaw.length - 1, i + W);
    let mn = Infinity, mx = -Infinity;
    for (let j = lo; j <= hi; j++) {
      const v = tideRaw[j];
      if (v != null) { if (v < mn) mn = v; if (v > mx) mx = v; }
    }
    const amp = (mx - mn) / 2;
    const mid = (mx + mn) / 2;
    const h   = tideRaw[i] ?? mid;
    const hNorm = amp > 0.05 ? (h - mid) / amp : 0;  // -1 à +1
    // Dérivée centrée (m/h) puis normalisée par amplitude/6 (1h sur 6h ≈ pleine vitesse)
    const prev = tideRaw[Math.max(0, i-1)] ?? h;
    const next = tideRaw[Math.min(tideRaw.length-1, i+1)] ?? h;
    const dh   = (next - prev) / 2;
    const dhNorm = amp > 0.05 ? Math.max(-1, Math.min(1, dh / (amp/3))) : 0;
    tideStats.push({ h, hNorm, dh, dhNorm });
  }

  const hours = [];
  for (let i = 0; i < mh.time.length; i++) {
    const t    = mh.time[i];
    const hour = parseInt(t.slice(11,13));
    if (![6, 9, 12, 15, 18].includes(hour)) continue;
    const rawSwells = [
      {H: mh.swell_wave_height?.[i]||0,           dir: mh.swell_wave_direction?.[i]||0,           T: mh.swell_wave_period?.[i]||0,           lbl:"Houle primaire"},
      {H: mh.secondary_swell_wave_height?.[i]||0, dir: mh.secondary_swell_wave_direction?.[i]||0, T: mh.secondary_swell_wave_period?.[i]||0, lbl:"Houle secondaire"},
      {H: mh.wind_wave_height?.[i]||0,            dir: mh.wind_wave_direction?.[i]||0,            T: mh.wind_wave_period?.[i]||0,            lbl:"Mer de vent"},
    ];
    const w = windByT[t] || {};
    const wDir = w.dir ?? 90, wSpd = w.spd ?? 12;
    const res = combineSpot(rawSwells, wDir, wSpd);
    const tide = tideStats[i] || { h: 0, hNorm: 0, dh: 0, dhNorm: 0 };
    const tideQ = tideQuality(tide.hNorm, tide.dhNorm);
    hours.push({
      t, hour, date: t.slice(0,10),
      sw: res.swells, inCone: res.inCone, outCone: res.outCone, dominant: res.dominant,
      Hc: res.Hc, Hraw: res.Hraw, cleanliness: res.cleanliness, T: res.T,
      wDir, wSpd, wq: res.wq,
      tide, tideQ, tidePhase: tidePhase(tide.hNorm, tide.dhNorm),
      sizeR: sizeRate(res.Hc, res.T),
      rWind: rate(res.Hc, res.T, res.wq, res.cleanliness),
      rTide: rateTide(res.Hc, res.T, res.wq, res.cleanliness, tideQ),
      r: rateTide(res.Hc, res.T, res.wq, res.cleanliness, tideQ),  // r = note complète
      stats: wStats(res.Hc, res.T),
      ratio: res.Hraw > 0 ? res.Hc / res.Hraw : 0,
    });
  }
  // Grouper par jour avec timeline marée complète (24 points)
  const days = [];
  let cur = null;
  // Construire un index timeline par date
  const tideByDate = {};
  for (let i = 0; i < mh.time.length; i++) {
    const t  = mh.time[i];
    const dt = t.slice(0,10);
    if (!tideByDate[dt]) tideByDate[dt] = [];
    const ts = tideStats[i] || { h:0, hNorm:0, dh:0, dhNorm:0 };
    tideByDate[dt].push({ hour: parseInt(t.slice(11,13)), h: ts.h, hNorm: ts.hNorm, dhNorm: ts.dhNorm });
  }
  for (const h of hours) {
    if (!cur || cur.date !== h.date) {
      if (cur) days.push(sumDay(cur));
      cur = { date: h.date, hours: [], tideTimeline: tideByDate[h.date] || [] };
    }
    cur.hours.push(h);
  }
  if (cur) days.push(sumDay(cur));
  return days;
}

function sumDay(d) {
  const hrs = d.hours;
  const maxR    = Math.max(...hrs.map(h=>h.r), 0);
  const maxRWind= Math.max(...hrs.map(h=>h.rWind ?? h.r), 0);
  const maxSizeR= Math.max(...hrs.map(h=>h.sizeR), 0);
  const maxHc   = Math.max(...hrs.map(h=>h.Hc), 0);
  const maxHraw = Math.max(...hrs.map(h=>h.Hraw), 0);
  const best    = hrs.find(h=>h.r===maxR) || hrs[0];
  const date    = new Date(d.date+"T12:00:00");
  return {
    date: d.date, hrs, maxR, maxRWind, maxSizeR, maxHc, maxHraw,
    tideTimeline: d.tideTimeline || [],
    stats: wStats(maxHc, best?.T || 0),
    best, dayName: DAY_FR[date.getDay()], dayNum: date.getDate(),
  };
}

function setTab(name) {
  STATE.tab = name;
  document.querySelectorAll("nav button").forEach(b => b.classList.toggle("active", b.dataset.tab === name));
  document.querySelectorAll("section").forEach(s => s.classList.toggle("active", s.id === "tab-"+name));
  renderHeader();
  if (name === "forecast")     renderForecast();
  else if (name === "calc")     renderCalc();
  else if (name === "archives") renderArchives();
  else if (name === "journal")  renderJournal();
  else if (name === "model")    renderModel();
}

function renderHeader() {
  const el = document.getElementById("score-block");
  let score = null;
  if (STATE.tab === "calc") {
    const r = computeCalc();
    score = { Hc: r.Hc, Hraw: r.Hraw, rating: r.rating, ratio: r.ratio };
  } else if (STATE.forecast.days?.[STATE.forecast.selDay]) {
    const d = STATE.forecast.days[STATE.forecast.selDay];
    score = { Hc: d.maxHc, Hraw: d.maxHraw, rating: d.maxR, ratio: d.maxHraw > 0 ? d.maxHc/d.maxHraw : 0 };
  } else if (STATE.archives.days?.length && STATE.archives.selDate) {
    const dayHrs = STATE.archives.days.find(x => x.date === STATE.archives.selDate);
    if (dayHrs) score = { Hc: dayHrs.maxHc, Hraw: dayHrs.maxHraw, rating: dayHrs.maxR, ratio: dayHrs.maxHraw>0 ? dayHrs.maxHc/dayHrs.maxHraw : 0 };
  }
  if (!score) { el.innerHTML = ""; return; }
  const rc = STARS[score.rating].c;
  el.innerHTML = `
    <div class="score-num" style="color:${rc}">${score.Hc.toFixed(2)}<span class="unit">m</span></div>
    <div class="score-label" style="color:${rc}">${STARS[score.rating].lbl.toUpperCase()}</div>
    <div class="score-meta">brut ${score.Hraw.toFixed(2)}m · ${Math.round(score.ratio*100)}%</div>
  `;
}

    </div>
    <div class="hour-bars">`;
    surfHrs.forEach(h => {
      const rc = STARS[h.r].c;
      const rawPct  = Math.max(2, (h.Hraw / peakHc / 1.1) * 100);
      const corrPct = Math.max(2, (h.Hc   / peakHc / 1.1) * 100);

        </div></div>`;
    });

      </div>

      <div class="heff"><div class="h" style="color:${hcol}">${sw.heff.toFixed(2)}</div><div class="m">m</div></div>
    </div>`;
  }
  if (h.outCone?.length > 0) {
    html += `<div style="font-size:9px;color:#e8b84b;padding:4px 9px;margin-bottom:5px">
      ≠ houle parasite hors cône ±45° — non additionnée. Cleanliness ×${h.cleanliness.toFixed(2)}
    </div>`;

  html += renderStatsBlock(h.stats, h.T);
  html += renderTideBlock(h, dayTimeline);
  html += renderRatingBreakdown(h);

    <div style="font-size:12px;font-weight:700;color:${h.wq.col};align-self:center">${h.wq.lbl}</div>
  </div></div>`;
  return html;
}

function renderTideBlock(h, dayTimeline) {
  if (!h.tide || h.tide.h == null) return "";
  const tideQ = h.tideQ;
  const qCol = tideQ > 0.85 ? "#39d353" : tideQ > 0.65 ? "#e8b84b" : "#ff6b6b";

  // Si on a une timeline, on dessine la courbe
  let curve = "";
  if (dayTimeline && dayTimeline.length >= 4) {
    const W = 260, H = 70, P = 4;
    const tides = dayTimeline.map(t => t.h);
    const tMin = Math.min(...tides), tMax = Math.max(...tides);
    const range = (tMax - tMin) || 0.1;
    const xFor = i => P + (i / (dayTimeline.length - 1)) * (W - 2*P);
    const yFor = v => H - P - ((v - tMin) / range) * (H - 2*P - 8);

    // Points + smooth path via Catmull-Rom → Bezier
    const pts = dayTimeline.map((t, i) => [xFor(i), yFor(t.h)]);
    let path = `M ${pts[0][0]},${pts[0][1]}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[i-1] || pts[i];
      const p1 = pts[i];
      const p2 = pts[i+1];
      const p3 = pts[i+2] || p2;
      const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
      const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
      const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
      const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
      path += ` C ${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
    }
    // Aire sous la courbe (effet visuel)
    const areaPath = path + ` L ${pts[pts.length-1][0]},${H-P} L ${pts[0][0]},${H-P} Z`;

    // Point pour l'heure courante
    const curIdx = dayTimeline.findIndex(t => t.hour === h.hour);
    let marker = "";
    let label  = "";
    if (curIdx >= 0) {
      const cx = pts[curIdx][0];
      const cy = pts[curIdx][1];
      marker = `<circle cx="${cx}" cy="${cy}" r="5" fill="${qCol}" stroke="#06080f" stroke-width="2"/>`;
      // Ligne verticale repère
      marker = `<line x1="${cx}" y1="${P}" x2="${cx}" y2="${H-P}" stroke="${qCol}" stroke-width="1" opacity="0.25" stroke-dasharray="2,2"/>` + marker;
    }
    // Heures sous la courbe
    let xLabels = "";
    for (let i = 0; i < dayTimeline.length; i += 6) {
      xLabels += `<text x="${xFor(i)}" y="${H-1}" text-anchor="middle" fill="#444" font-size="7" font-family="JetBrains Mono">${String(dayTimeline[i].hour).padStart(2,"0")}h</text>`;
    }
    // Ligne zéro (niveau moyen)
    const zeroY = yFor(0);

    curve = `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;margin:6px 0 4px">
      <defs>
        <linearGradient id="tideGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffa657" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#ffa657" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <line x1="${P}" y1="${zeroY}" x2="${W-P}" y2="${zeroY}" stroke="#333" stroke-width="0.5" stroke-dasharray="2,3"/>
      <path d="${areaPath}" fill="url(#tideGrad)"/>
      <path d="${path}" fill="none" stroke="#ffa657" stroke-width="1.5"/>
      ${marker}
      ${xLabels}
    </svg>`;
  }

  return `<div style="margin-top:8px;padding:9px 10px;background:rgba(255,166,87,0.04);border:1px solid rgba(255,166,87,0.15);border-radius:6px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="µ" style="color:#ffa657">MARÉE</div>
      <div style="font-size:9px;color:${qCol}">qualité ×${tideQ.toFixed(2)}</div>
    </div>
    ${curve}
    <div style="display:flex;justify-content:space-between;font-size:10px;margin-top:2px">
      <span style="color:#cdd9e5">${h.tidePhase}</span>
      <span style="color:#768390">${h.tide.h>=0?"+":""}${h.tide.h.toFixed(2)}m · ${h.tide.dhNorm > 0.05 ? "↑ monte" : h.tide.dhNorm < -0.05 ? "↓ descend" : "— étale"}</span>
    </div>
  </div>`;
}

function renderRatingBreakdown(h) {

  const notes = [

// ── CORRECTEUR ─────────────────────────────────────────────────────────────
function computeCalc() {
  const inp = STATE.calc.inp;
  const raw = [
    {H:+inp.s1.H||0,dir:+inp.s1.dir||0,T:+inp.s1.T||0,lbl:"Houle primaire"},
    {H:+inp.s2.H||0,dir:+inp.s2.dir||0,T:+inp.s2.T||0,lbl:"Houle secondaire"},
    {H:+inp.ww.H||0,dir:+inp.ww.dir||0,T:+inp.ww.T||0,lbl:"Mer de vent"},
  ];
  const wDir = +inp.wind.dir||90, wSpd = +inp.wind.spd||12;
  const res = combineSpot(raw, wDir, wSpd);
  return {
    sw: res.swells, inCone: res.inCone, outCone: res.outCone,
    Hc: res.Hc, Hraw: res.Hraw, cleanliness: res.cleanliness,
    T: res.T, wq: res.wq, wDir: res.wDir, wSpd: res.wSpd,
    rating: rate(res.Hc, res.T, res.wq, res.cleanliness),
    sizeR: sizeRate(res.Hc, res.T),
    stats: wStats(res.Hc, res.T),
    ratio: res.Hraw > 0 ? res.Hc/res.Hraw : 0,
  };
}

      const hcol = cs === "in" ? "#cdd9e5" : cs === "out" ? "#888" : "#333";

      html += `<div class="swell-row ${cs==='out'?'out-cone':''}" style="background:rgba(0,0,0,0.3)">

      style="width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.09);border-radius:5px;padding:8px 10px;color:#cdd9e5;font-size:11px;box-sizing:border-box;margin-bottom:8px"

function setCalc(g, f, v) { STATE.calc.inp[g][f] = v; renderHeader(); renderCalc(); }
function stepCalc(g, f, delta, dec, mn, mx) {
  const cur = +STATE.calc.inp[g][f] || 0;
  const nxt = Math.max(mn, Math.min(mx, +(cur + delta).toFixed(dec)));
  STATE.calc.inp[g][f] = String(nxt);
  renderHeader(); renderCalc();
}
function setObsRating(r) { STATE.calc.obsRating = r; renderCalc(); }
function saveSession() {
  const r = computeCalc();
  const entry = {
    id: Date.now(),
    date: new Date().toLocaleDateString("fr-FR"),
    inp: JSON.parse(JSON.stringify(STATE.calc.inp)),
    Hc: r.Hc, modelR: r.rating, sizeR: r.sizeR,
    realR: STATE.calc.obsRating, notes: STATE.calc.obsNote,
  };
  STATE.journal = [entry, ...STATE.journal].slice(0, 60);
  LS.save("journal", STATE.journal);
  STATE.calc.obsNote = "";
  recalibrate();
  renderCalc();
}

// ── ARCHIVES ───────────────────────────────────────────────────────────────
async function loadArchives() {
  STATE.archives.loading = true; STATE.archives.err = null;
  renderArchives();
  try {
    const days = await fetchArchives("2026-03-01", "2026-04-30");
    STATE.archives.days = days;
    LS.save("arch_cache", { days });
    // Recalibrer dès qu'on a les données et les obs
    const newCal = computeCalibrationFactor(STATE.archives.obs, days);
    if (Math.abs(newCal - STATE.calibration) > 0.005) {
      STATE.calibration = newCal;
      // Reprocesser les archives avec le nouveau facteur
      const recomputed = await fetchArchives("2026-03-01", "2026-04-30");
      STATE.archives.days = recomputed;
      LS.save("arch_cache", { days: recomputed });
      // Idem pour forecast si présent
      if (STATE.forecast.days) {
        const fc = await fetchForecast();
        STATE.forecast.days = fc; STATE.forecast.ts = Date.now();
        LS.save("fc_cache", { days: fc, ts: Date.now() });
      }
    }
  } catch (e) {
    STATE.archives.err = e.message;
  } finally {
    STATE.archives.loading = false;
    renderArchives();
    renderHeader();
  }
}

function selectArchiveDate(d) { STATE.archives.selDate = STATE.archives.selDate === d ? null : d; renderHeader(); renderArchives(); }

function saveArchObs(date, hour, r, notes) {
  const key = `${date}|${hour}`;
  if (r === "" && !notes) delete STATE.archives.obs[key];
  else STATE.archives.obs[key] = { r, notes };
  // Persister uniquement les diffs par rapport aux seeds (les seeds restent en code)
  const userOnly = {};
  for (const [k, v] of Object.entries(STATE.archives.obs)) {
    const seed = SEED_OBSERVATIONS[k];
    if (!seed || seed.r !== v.r || seed.notes !== v.notes) userOnly[k] = v;
  }
  LS.save("arch_obs", userOnly);
  recalibrate();
  renderArchives();
  renderHeader();
}

// Recalcule le facteur de calibration et invalide les caches pour forcer recalcul
function recalibrate() {
  const newCal = computeCalibrationFactor(STATE.archives.obs, STATE.archives.days);
  if (Math.abs(newCal - STATE.calibration) < 0.001) return;
  STATE.calibration = newCal;
  // Invalider caches pour forcer recalcul avec nouveau facteur au prochain fetch
  LS.save("fc_cache", null);
  LS.save("arch_cache", null);
  // Si les archives sont déjà chargées en mémoire, reprocesser via fetch (rapide)
  // ou marquer comme stale. Pour simplicité, on force un re-fetch async des archives.
  if (STATE.archives.days) {
    fetchArchives("2026-03-01", "2026-04-30")
      .then(days => { STATE.archives.days = days; LS.save("arch_cache", { days }); renderArchives(); })
      .catch(() => {});
  }
  if (STATE.forecast.days) {
    fetchForecast()
      .then(days => { STATE.forecast.days = days; STATE.forecast.ts = Date.now(); LS.save("fc_cache", { days, ts: Date.now() }); renderForecast(); renderHeader(); })
      .catch(() => {});
  }
}

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${month}-${String(d).padStart(2,"0")}`;
      const dayRow  = a.days.find(x => x.date === dateStr);
      const obs     = dayRow ? dayRow.hrs.filter(h => a.obs[`${dateStr}|${h.hour}`]).length : 0;
      const isSel   = a.selDate === dateStr;
      if (!dayRow) {
        html += `<div class="cal-cell"><div class="d" style="color:#333">${d}</div></div>`;
      } else {
        const maxR = dayRow.maxSizeR;
        const rc   = STARS[maxR].c;
        html += `<div class="cal-cell has-data ${isSel?'active':''}" style="background:${rc}18;border-color:${rc}44" onclick="selectArchiveDate('${dateStr}')">
          <div class="d" style="color:${rc}">${d}</div>
          ${dayRow.maxHc>0 ? `<div class="hc" style="color:${rc}">${dayRow.maxHc.toFixed(1)}</div>` : ""}
          ${obs>0 ? `<div class="obs-dot"></div>` : ""}
        </div>`;
      }
    }
    html += `</div></div>`;
  }

  // Détail jour sélectionné
  if (a.selDate) {
    const dayRow = a.days.find(d => d.date === a.selDate);
    if (dayRow) {
      const dateObj = new Date(a.selDate+"T12:00:00");
      html += `<div class="card fi" style="border-color:rgba(0,212,255,0.2);margin-top:14px">
        <div class="µ" style="color:#00d4ff;margin-bottom:12px">
          ${dateObj.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}).toUpperCase()} — DONNÉES OPEN-METEO CORRIGÉES
        </div>`;
      for (const h of dayRow.hrs) {
        const key   = `${a.selDate}|${h.hour}`;
        const saved = a.obs[key] || { r: "", notes: "" };
        const compR = h.sizeR;
        const compColor = STARS[compR].c;
        const rc    = STARS[h.r].c;
        const delta = saved.r !== "" ? saved.r - compR : null;
        html += `<div class="day-row">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:12px;font-weight:700;color:#768390">${String(h.hour).padStart(2,"0")}h</span>
              <span style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:${rc}">${h.Hc.toFixed(2)}m</span>
              <span style="font-size:9px;color:#444">▲${h.stats.hSet.toFixed(2)}m · ${h.T}s · ${Math.round(h.ratio*100)}%</span>
            </div>
            <div style="text-align:right">
              <span style="font-size:10px;font-weight:700;color:${compColor}">${STARS[compR].lbl}</span>
              <div style="font-size:8px;color:#444">note taille</div>
            </div>
          </div>`;
        for (const sw of h.sw) {
          const bl = blockReason(sw.dir, sw.T);
          const cs = sw.coneStatus || "blocked";
          const icon = cs === "in" ? "✓" : cs === "out" ? "≠" : "×";
          const icol = cs === "in" ? "#39d353" : cs === "out" ? "#e8b84b" : "#444";
          const hcol = cs === "in" ? "#cdd9e5" : cs === "out" ? "#888" : "#333";
          html += `<div style="display:flex;align-items:center;gap:6px;font-size:10px;margin-bottom:3px;${cs==='out'?'opacity:0.65':''}">
            <span style="color:${icol};min-width:10px;font-weight:700">${icon}</span>
            <div style="width:5px;height:5px;border-radius:50%;background:${bl.c};flex-shrink:0"></div>
            <span style="color:#555;min-width:90px">${sw.lbl}</span>
            <span style="color:#768390">${dl(sw.dir)} ${sw.dir}° · ${sw.H.toFixed(2)}m · ${sw.T.toFixed(0)}s</span>
            <span style="margin-left:auto;font-size:9px;color:${bl.c}">${bl.r}</span>
            <span style="font-weight:700;color:${hcol};min-width:38px;text-align:right">${sw.heff.toFixed(2)}m</span>
          </div>`;
        }
        html += `<div style="font-size:9px;color:#444;margin:8px 0">
          Vent ${dl(h.wDir)} ${h.wDir.toFixed(0)}° ${h.wSpd.toFixed(0)}kt — <span style="color:${h.wq.col}">${h.wq.lbl}</span>
          ${h.tide ? `· Marée ${h.tidePhase} (${h.tide.h>=0?"+":""}${h.tide.h.toFixed(2)}m · qualité ×${h.tideQ.toFixed(2)})` : ""}
        </div>`;
        html += `<div style="padding:8px 10px;background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.1);border-radius:5px">
          <div class="µ" style="color:#00d4ff;margin-bottom:6px">TON OBSERVATION CE JOUR-LÀ</div>
          <div class="rating-row" style="margin-bottom:6px">
            ${[0,1,2,3,4,5].map(rv => {
              const sel = saved.r === rv;
              const ge  = saved.r !== "" && rv <= +saved.r && rv > 0;
              const bg  = sel ? STARS[rv].c : ge ? STARS[+saved.r].c+"33" : "rgba(255,255,255,0.04)";
              const col = sel || ge ? "#000" : "#555";
              const t   = rv === 0 ? "FLAT" : rv;
              return `<button class="${rv===0?'flat-btn':''}" style="background:${bg};color:${col}" onclick="saveArchObs('${a.selDate}',${h.hour},${rv},'${(saved.notes||"").replace(/'/g,"\\'")}')">${t}</button>`;
            }).join("")}
          </div>
          ${saved.r !== "" && delta !== null ? `<div style="font-size:9px;color:${Math.abs(delta)<=1?'#39d353':'#ffa657'};text-align:center;margin-bottom:6px">
            ${delta===0 ? "modèle ✓" : delta>0 ? `modèle sous-estime de ${delta}` : `modèle surestime de ${Math.abs(delta)}`}
          </div>` : ""}
          <input type="text" placeholder="Notes : hauteur vue, séries..."
            value="${(saved.notes||"").replace(/"/g, "&quot;")}"
            style="width:100%;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:6px 8px;color:#cdd9e5;font-size:10px;box-sizing:border-box"
            onchange="saveArchObs('${a.selDate}',${h.hour},'${saved.r}',this.value)">
        </div></div>`;
      }
      html += `</div>`;
    }
  }

  // Biais
  const validObs = Object.entries(a.obs).filter(([,v]) => v.r !== "");
  if (validObs.length >= 5) {
    const pairs = validObs.map(([k, v]) => {
      const [date, hour] = k.split("|");
      const dayRow = a.days.find(d => d.date === date);
      const h = dayRow?.hrs.find(x => x.hour === +hour);
      return h ? { model: h.sizeR, real: +v.r } : null;
    }).filter(Boolean);
    if (pairs.length) {
      const avg = pairs.reduce((s, p) => s + (p.real - p.model), 0) / pairs.length;
      const absAvg = Math.abs(avg);
      html += `<div class="card" style="border-color:rgba(0,212,255,0.2);background:rgba(0,212,255,0.03);margin-top:12px">
        <div class="µ" style="color:#00d4ff;margin-bottom:8px">BIAIS TAILLE SUR ${pairs.length} OBSERVATIONS</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:${absAvg<.5?'#39d353':'#ffa657'};margin-bottom:6px">
          ${avg>0?"+":""}${avg.toFixed(2)} crans
        </div>
        <div style="font-size:10px;color:#768390;line-height:1.6">
          ${absAvg<.4 ? "Calibration taille correcte ✓"
            : avg>0  ? "Le modèle sous-estime la taille — augmenter les coefficients de transmission"
            :          "Le modèle surestime — réduire les coefficients"}
          <br><span style="font-size:9px;color:#444">Comparaison sur la note TAILLE seule (sans vent/cleanliness)</span>
        </div>
      </div>`;
    }
  }

  el.innerHTML = html;
}

// ── JOURNAL ─────────────────────────────────────────────────────────────────
function renderJournal() {
  const el = document.getElementById("journal-content");
  const j  = STATE.journal;
  if (j.length === 0) {
    el.innerHTML = `<div class="µ">0 SESSION</div>
      <div style="text-align:center;padding:48px 0;color:#333;font-size:11px">
        Aucune session enregistrée.<br><span style="font-size:9px">Enregistre depuis CORRECTEUR.</span>
      </div>`;
    return;
  }
  let html = `<div class="µ">${j.length} SESSION${j.length>1?'S':''}</div>`;
  for (const o of j) {
    const delta = o.realR - (o.sizeR ?? o.modelR);
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px">
        <div><div class="µ">${o.date}</div>
          <div style="margin-top:4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span style="font-size:13px;font-weight:700;color:${STARS[o.realR].c}">${STARS[o.realR].lbl}</span>
            <span style="font-size:9px;color:#444">${o.Hc?.toFixed(2)}m · ${o.inp?.s1?.dir}° ${o.inp?.s1?.T}s</span>
          </div>
        </div>
        <div style="text-align:right"><div class="µ">modèle taille</div>
          <div style="font-size:12px;color:${STARS[o.sizeR ?? o.modelR].c};font-weight:700">${STARS[o.sizeR ?? o.modelR].lbl}
            <span style="margin-left:5px;font-size:10px;color:${delta===0?'#39d353':'#ffa657'}">${delta>0?'+'+delta:delta<0?delta:'✓'}</span>
          </div>
        </div>
      </div>
      ${o.notes ? `<div style="font-size:10px;color:#768390;margin-top:6px">${o.notes}</div>` : ""}
    </div>`;
  }
  if (j.length >= 3) {
    const avg = j.map(o => o.realR - (o.sizeR ?? o.modelR)).reduce((s,d) => s+d, 0) / j.length;
    html += `<div class="card" style="border-color:rgba(0,212,255,0.15);margin-top:14px">
      <div class="µ" style="color:#00d4ff;margin-bottom:6px">BIAIS MOYEN</div>
      <div style="font-size:10px;color:#cdd9e5">
        ${avg>.4 ? `+${avg.toFixed(1)} — sous-estime`
        : avg<-.4 ? `${avg.toFixed(1)} — surestime`
        :           `${avg.toFixed(1)} — calibration correcte ✓`}
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

// ── MODÈLE ──────────────────────────────────────────────────────────────────
function renderModel() {
  const el = document.getElementById("model-content");

  // Bloc calibration en tête
  const cal = STATE.calibration;
  const obsCount = Object.values(STATE.archives.obs || {}).filter(v => v.r !== "" && v.r != null).length;
  const calPct = ((cal - 1) * 100).toFixed(1);
  const calCol = Math.abs(cal - 1) < 0.04 ? "#39d353" : Math.abs(cal - 1) < 0.15 ? "#e8b84b" : "#ff6b6b";
  let html = `<div class="card" style="border-color:${calCol}33;background:${calCol}09">
    <div class="µ" style="color:${calCol};margin-bottom:8px">AUTO-CALIBRATION ACTIVE</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:${calCol};margin-bottom:6px">
      ×${cal.toFixed(3)} ${calPct >= 0 ? "(+":"("}${calPct}%)
    </div>
    <div style="font-size:10px;color:#768390;line-height:1.6">
      Facteur d'amplification global appris automatiquement à partir de <strong>${obsCount} observation${obsCount>1?"s":""}</strong>.<br>
      Appliqué à Hc en sortie de combineSpot. Mis à jour à chaque saisie d'observation.<br>
      <span style="font-size:9px;color:#444">Formule : 1 + 0.08 × biais_moyen(crans), plafonné ±35%</span>
    </div>
    ${obsCount >= 3 ? `<button class="btn sec" style="margin-top:10px;font-size:9px;letter-spacing:0.1em" onclick="exportObservations()">↗ EXPORTER OBSERVATIONS POUR CODE</button>` : ""}
  </div>`;

  // ── DIAGNOSTIC STRATIFIÉ PAR SECTEUR DIRECTIONNEL ──────────────────────
  const stratified = computeStratifiedBias(STATE.archives.obs, STATE.archives.days);
  const hasAnyData = stratified.some(s => s.count > 0);
  if (hasAnyData) {
    html += `<div class="card" style="border-color:rgba(0,212,255,0.2);background:rgba(0,212,255,0.03)">
      <div class="µ" style="color:#00d4ff;margin-bottom:10px">DIAGNOSTIC PAR SECTEUR DIRECTIONNEL</div>
      <div style="font-size:10px;color:#768390;line-height:1.6;margin-bottom:12px">
        Biais du modèle séparé par direction de la houle dominante.
        Permet d'identifier si certaines zones (Caravelle, ombre Dominique...) sont sur- ou sous-estimées spécifiquement,
        sans contaminer la calibration globale.
      </div>`;

    for (const s of stratified) {
      const [lo, hi] = s.range;
      const arcLbl = `${lo}°-${hi}°`;
      if (s.count === 0) {
        html += `<div style="margin-bottom:8px;padding:8px 10px;background:rgba(0,0,0,0.2);border-radius:5px;opacity:0.5">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <span style="font-size:10px;font-weight:700;color:${s.col}">${s.key}</span>
              <span style="font-size:9px;color:#555;margin-left:6px">${s.lbl} · ${arcLbl}</span>
            </div>
            <span style="font-size:9px;color:#444">pas de données</span>
          </div>
        </div>`;
        continue;
      }

      // Couleur du biais selon intensité
      const absBias = Math.abs(s.bias);
      const biasCol = absBias < 0.4 ? "#39d353"
                    : absBias < 0.9 ? "#e8b84b"
                    :                  "#ff6b6b";
      const interp = absBias < 0.4 ? "Bien calibré ✓"
                   : s.bias > 0     ? "Sous-estim."
                   :                   "Surestim.";
      // Niveau de confiance selon nombre d'obs
      const confidence = s.count < 3 ? "faible" : s.count < 8 ? "moyenne" : "haute";

      // Barre visuelle : range [-3, +3] crans, point au biais
      const barW = 100; // pourcentage
      const biasClamp = Math.max(-3, Math.min(3, s.bias));
      const dotPos = ((biasClamp + 3) / 6) * 100;  // 0% à 100%
      const stdClamp = Math.min(2, s.std || 0);
      const stdW = (stdClamp / 6) * 100;
      const stdLo = Math.max(0, dotPos - stdW);
      const stdHi = Math.min(100, dotPos + stdW);

      html += `<div style="margin-bottom:10px;padding:9px 10px;background:rgba(0,0,0,0.25);border-radius:6px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px">
          <div>
            <span style="font-size:11px;font-weight:700;color:${s.col}">${s.key}</span>
            <span style="font-size:9px;color:#768390;margin-left:6px">${s.lbl}</span>
          </div>
          <div style="display:flex;gap:10px;align-items:center">
            <span style="font-size:9px;color:#444">${s.count} obs · conf. ${confidence}</span>
            <span style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:${biasCol}">
              ${s.bias > 0 ? "+" : ""}${s.bias.toFixed(2)}
            </span>
          </div>
        </div>
        <!-- Barre biais : -3 ... 0 ... +3 -->
        <div style="position:relative;height:8px;background:rgba(255,255,255,0.04);border-radius:4px;margin:6px 0 4px">
          <!-- Bande ±1σ -->
          <div style="position:absolute;left:${stdLo}%;width:${stdHi-stdLo}%;top:0;bottom:0;background:${biasCol};opacity:0.18;border-radius:4px"></div>
          <!-- Ligne zéro -->
          <div style="position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:#555"></div>
          <!-- Point biais -->
          <div style="position:absolute;left:${dotPos}%;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:${biasCol};border-radius:50%;border:2px solid #06080f"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:8px;color:#333">
          <span>surestime −3</span>
          <span>0</span>
          <span>+3 sous-estime</span>
        </div>
        <div style="font-size:9px;color:${biasCol};margin-top:5px">${interp} <span style="color:#555;font-weight:400">— ${s.hint}</span></div>
      </div>`;
    }

    // Synthèse interprétative
    const wellCal = stratified.filter(s => s.count >= 3 && Math.abs(s.bias) < 0.4);
    const offCal  = stratified.filter(s => s.count >= 3 && Math.abs(s.bias) >= 0.5);
    if (offCal.length > 0) {
      html += `<div style="margin-top:8px;padding:9px 10px;background:rgba(232,184,75,0.05);border-radius:5px;font-size:10px;color:#cdd9e5;line-height:1.6">
        <strong style="color:#e8b84b">À investiguer :</strong> `;
      const items = offCal.map(s => `secteur <strong>${s.key}</strong> (${s.bias > 0 ? "+":""}${s.bias.toFixed(1)})`);
      html += items.join(", ") + `.`;
      // Suggestions concrètes selon le secteur
      const e = offCal.find(s => s.key === "E");
      if (e && e.bias > 0.5) {
        html += `<br><span style="font-size:9px;color:#768390">→ Suggestion : augmenter le coefficient de transmission Caravelle (actuellement diff 0.25-0.95, monter le minimum à 0.35).</span>`;
      }
      const no = offCal.find(s => s.key === "NO");
      if (no && no.bias > 0.5) {
        html += `<br><span style="font-size:9px;color:#768390">→ Suggestion : assouplir les ombres Dominique/Guadeloupe (actuellement très restrictives à courte période).</span>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  const zones = [
    {n:"CARAVELLE — pointe à 85.5°", arc:"45°→85.5° flanc · 85.5°→145° derrière", dist:"7.5 km", c:"#ff6b6b",
     d:"Modèle calibré sur observations terrain. Diffraction 25-95% selon période. T=10s à 85° → ~55%. T=16s à 90° → ~85%."},
    {n:"GUADELOUPE · Pointe des Châteaux", arc:"333.5° → 349.8°", dist:"133-167 km", c:"#ffa657",
     d:"Ombre forte. 5% à T=8s → 90% à T=22s. Les très longs groundswells contournent Basse-Terre."},
    {n:"DOMINIQUE", arc:"312.9° → 339.1°", dist:"72-102 km", c:"#e8b84b",
     d:"Ombre modérée. 10% à T=6s → 100% à T=22s."},
  ];
  for (const z of zones) {
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:4px">
        <div style="font-size:10px;font-weight:700;color:${z.c}">${z.n}</div>
        <div style="font-size:8px;color:#333">${z.dist}</div>
      </div>
      <div class="µ" style="color:#555;margin-bottom:4px">${z.arc}</div>
      <div style="font-size:10px;color:#768390;line-height:1.7">${z.d}</div>
    </div>`;
  }

  html += `<div class="card" style="border-color:rgba(255,166,87,0.2);background:rgba(255,166,87,0.03)">
    <div class="µ" style="color:#ffa657;margin-bottom:8px">MODÈLE DE MARÉE — REEF BREAK</div>
    <div style="font-size:10px;color:#cdd9e5;line-height:1.7;margin-bottom:8px">
      Marnage microtidal aux Antilles (~30-60cm en vives-eaux) mais effet massif sur la qualité parce que critère de déferlement <strong>H_break = γ × h</strong> (γ ≈ 0.78) dépend directement de la profondeur au-dessus du reef.<br><br>
      <strong>Observations terrain (Tartane) :</strong><br>
      <span style="color:#ff6b6b">●</span> Basse étale → peu de séries, attente longue (qualité ~0.35)<br>
      <span style="color:#e8b84b">●</span> Basse + courant → creux, rapide, close out possible (~0.55)<br>
      <span style="color:#39d353">●</span> Mi-marée descendante → optimum (~0.95-1.00)<br>
      <span style="color:#e8b84b">●</span> Haute + courant → pente molle, déferlement OK (~0.65)<br>
      <span style="color:#ff6b6b">●</span> Haute étale → mou, peu qualitatif (~0.30)
    </div>
    <div style="font-size:9px;color:#555;font-family:monospace;line-height:1.6">
      tideQuality = niveau × asymétrie × courant<br>
      niveau     = 1 − 0.4 × hNorm²<br>
      asymétrie  = 1.0 si descendante, 0.92 si montante<br>
      courant    = 0.4 + 0.6 × min(1, 2·|dhNorm|)
    </div>
  </div>

  <div class="card" style="border-color:rgba(57,211,83,0.2);background:rgba(57,211,83,0.03)">
    <div class="µ" style="color:#39d353;margin-bottom:8px">TROIS NIVEAUX DE NOTE</div>
    <div style="font-size:10px;color:#cdd9e5;line-height:1.7">
      <strong style="color:#768390">Taille</strong> — Hc + période seuls (référence pour calibration archives)<br>
      <strong style="color:#ffa657">+ Vent</strong> — ajoute facteur vent et cleanliness (utilisation surf "qualité conditions")<br>
      <strong style="color:#39d353">+ Marée</strong> — ajoute facteur qualité-marée (note la plus complète : "vais-je sortir ?")
    </div>
  </div>

  <div class="card" style="border-color:rgba(57,211,83,0.2);background:rgba(57,211,83,0.03)">
    <div class="µ" style="color:#39d353;margin-bottom:8px">CÔNE DE COHÉRENCE DIRECTIONNELLE</div>
    <div style="font-size:10px;color:#cdd9e5;line-height:1.7;margin-bottom:8px">
      <span style="color:#39d353">✓</span> Composantes dans le cône <strong>±45°</strong> autour de la dominante → s'additionnent en énergie (vague combinée cohérente).<br>
      <span style="color:#e8b84b">≠</span> Composantes hors cône → affichées mais <strong>NON additionnées</strong> à Hc.<br><br>
      Pénalité de cleanliness appliquée à la note quand énergie parasite significative.
    </div>
    <div style="font-size:9px;color:#555;font-family:monospace;line-height:1.6">
      Hc = √(Σ H²_eff,i)  pour i ∈ cône ±45°<br>
      cleanliness = max(0.5, 1 − 0.3 × √(E_hors / E_dans))<br>
      note = round((sizeRate + vent×1.5) × cleanliness)
    </div>
  </div>`;

  // Rose
  html += `<div class="card"><div class="µ">ROSE D'EXPOSITION 360°</div><div class="rose">`;
  for (let i = 0; i < 72; i++) {
    const d = i * 5;
    const clean = d >= 350 || d <= 45;
    const guad  = d >= 333.5 && d <= 349.8;
    const dom   = d >= 312.9 && d <= 339.1;
    const cL = d > 45 && d <= 85;
    const cD = d > 85 && d < 130;
    const cX = d >= 130 && d < 225;
    let bg;
    if (cX) bg = "#090b10";
    else if (cD) bg = `rgba(255,80,80,${(0.12+(130-d)/45*0.18).toFixed(2)})`;
    else if (cL) bg = `rgba(255,130,80,${(0.12+(d-45)/40*0.32).toFixed(2)})`;
    else if (guad) bg = "rgba(255,100,100,0.55)";
    else if (dom)  bg = "rgba(255,166,87,0.45)";
    else if (clean) bg = "rgba(0,212,255,0.65)";
    else bg = "rgba(255,255,255,0.04)";
    html += `<div style="flex:1;background:${bg}"></div>`;
  }
  html += `</div><div class="rose-labels">${["NO","N","NE","E","SE","S","SO","O","NO"].map(l => `<div>${l}</div>`).join("")}</div></div>`;

  // Stats
  html += `<div class="card" style="border-color:rgba(0,212,255,0.15);background:rgba(0,212,255,0.03)">
    <div class="µ" style="color:#00d4ff;margin-bottom:8px">STATISTIQUES SPECTRALES</div>
    <div style="font-size:10px;line-height:1.7;color:#cdd9e5">
      <strong>H 10%</strong> = Hs × 1.27 — top 10% selon Rayleigh<br>
      <strong>H séries</strong> = Hs × GF(T) — séries après ~10min d'attente<br>
      <span style="color:#555">GF(7s)=1.22 · GF(12s)=1.77 · GF(15s)=2.10 · GF(18s)=2.43 — calibré sur observation 0.60m réelle à T=15s/Hs=0.29m</span>
    </div>
  </div>`;

  html += `<div class="card" style="margin-top:14px;background:rgba(0,0,0,0.3)">
    <div class="µ" style="margin-bottom:8px;color:#444">SOURCES DONNÉES</div>
    <div style="font-size:9px;color:#555;line-height:1.7">
      Prévisions : Open-Meteo Marine API (combine GFS Waves + IFS HRES + WaveWatch III)<br>
      Archives : ERA5 + Copernicus Marine via Open-Meteo<br>
      Vent : Open-Meteo Forecast / Archive<br><br>
      Coordonnées Tartane : 14.7707°N / 60.8989°W
    </div>
  </div>`;

  el.innerHTML = html;
}

// ── EXPORT OBSERVATIONS → CODE ─────────────────────────────────────────────
// Génère un bloc de code prêt à intégrer dans SEED_OBSERVATIONS du fichier
// source. L'utilisateur copie le résultat et le partage avec moi pour que
// j'intègre dans le code de la prochaine version.
function exportObservations() {
  const obs = STATE.archives.obs || {};
  const entries = Object.entries(obs)
    .filter(([,v]) => v.r !== "" && v.r != null)
    .sort(([a],[b]) => a.localeCompare(b));
  if (!entries.length) { alert("Aucune observation à exporter."); return; }

  // Génération formatée
  let code = "// SEED_OBSERVATIONS — exporté le " + new Date().toISOString().slice(0,10) + "\n";
  code += "// " + entries.length + " observations\n";
  code += "const SEED_OBSERVATIONS = {\n";
  for (const [k, v] of entries) {
    const notes = (v.notes || "").replace(/"/g, '\\"');
    code += `  "${k}": { r: ${v.r}, notes: "${notes}" },\n`;
  }
  code += "};\n";

  // Affichage en modal simple via prompt-like
  const ta = document.createElement("textarea");
  ta.value = code;
  ta.style.cssText = "position:fixed;top:5%;left:5%;width:90%;height:80%;z-index:9999;background:#06080f;color:#39d353;border:2px solid #00d4ff;padding:14px;font-family:JetBrains Mono,monospace;font-size:11px;border-radius:8px";
  document.body.appendChild(ta);
  ta.focus(); ta.select();

  const closeBtn = document.createElement("button");
  closeBtn.textContent = "✕ FERMER";
  closeBtn.style.cssText = "position:fixed;top:7%;right:6%;z-index:10000;background:#ff6b6b;color:#000;border:none;border-radius:4px;padding:8px 12px;font-family:JetBrains Mono,monospace;font-size:11px;font-weight:700;cursor:pointer";
  closeBtn.onclick = () => { ta.remove(); closeBtn.remove(); copyBtn.remove(); };
  document.body.appendChild(closeBtn);

  const copyBtn = document.createElement("button");
  copyBtn.textContent = "⎘ COPIER";
  copyBtn.style.cssText = "position:fixed;top:7%;right:22%;z-index:10000;background:#00d4ff;color:#000;border:none;border-radius:4px;padding:8px 12px;font-family:JetBrains Mono,monospace;font-size:11px;font-weight:700;cursor:pointer";
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(code).then(() => {
      copyBtn.textContent = "✓ COPIÉ";
      setTimeout(() => { copyBtn.textContent = "⎘ COPIER"; }, 1500);
    });
  };
  document.body.appendChild(copyBtn);
}

// ── INIT ────────────────────────────────────────────────────────────────────
document.querySelectorAll("nav button").forEach(b => {
  b.addEventListener("click", () => setTab(b.dataset.tab));
});

loadState();
// Calibration initiale si on a déjà obs + archives en cache
if (STATE.archives.days) {
  STATE.calibration = computeCalibrationFactor(STATE.archives.obs, STATE.archives.days);
}
renderHeader();
renderForecast();
renderCalc();
renderModel();
renderJournal();
renderArchives();

// Auto-fetch au démarrage si pas de cache
if (!STATE.forecast.days) {
  loadForecast();
}

</script>
